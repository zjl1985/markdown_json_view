<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown & JSON Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>📄 Markdown & JSON Viewer</h1>
      <div class="path-display">
        <span class="path-label">当前目录:</span>
        <span id="currentPath" class="path-value">加载中...</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Sidebar - File Tree -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span>📁 文件目录</span>
          <button class="collapse-all" onclick="collapseAll()">收起全部</button>
        </div>
        <div id="fileTree" class="file-tree">
          <div class="placeholder">加载中...</div>
        </div>
      </aside>

      <!-- Content Area -->
      <section class="content-area">
        <div id="contentDisplay" class="content-display">
          <div class="placeholder">选择左侧文件查看内容</div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
